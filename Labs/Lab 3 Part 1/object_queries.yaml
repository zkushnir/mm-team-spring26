# list of serveral objects to detect
#    most useful when you're trying to determine what object will work best for tracking
#    (consistent detection, good depth values, etc.)
queries:
  # # - red robot toy # small, unique object (hard to prompt), inconsistent detection
  # # - black water bottle # reflective metal surface, poor depth values
  # - black coffee mug
  # - pink cat figure
  - pink and green ball
  - phone
  - coffee mug          # cylindrical, hollow geometry with handle
  - banana              # curved, elongated shape — tests non-convex grasps
  - shoe                # soft, deformable, irregular geometry
  - book                # flat, rigid, wide surface — tests wide grasp aperture

